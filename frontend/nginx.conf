server {
  listen 8080;
  server_name _;

  # API proxy to backend Cloud Run (set BACKEND_URL via Cloud Run env, then sub in via entrypoint)
  # Default: forward /api/* to the backend service URL injected at build time
  location /api/ {
    # 빌드 시 sed 로 치환되는 placeholder
    proxy_pass https://innocean-audience-api-291757702623.asia-northeast3.run.app/api/;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
  }

  # Static frontend
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  # Health
  location /health {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
